services:
  douyin-parser:
    image: ${DOUYIN_PARSER_IMAGE:?DOUYIN_PARSER_IMAGE 未配置}
    container_name: douyin-parser
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_RELEASE_VERSION: ${APP_RELEASE_VERSION:-}
      COOKIE_DIR: /app/cookie_data
      PORT: 8080
      WEBHOOK_PORT: 5555
    volumes:
      - ./data/cookie_data:/app/cookie_data
    networks:
      - content-shared
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/v1/health', timeout=10)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  content-shared:
    external: true
